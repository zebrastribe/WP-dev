# WordPress files for this clone: repo-root `wordpress/` → /var/www/html.
# Isolation: `wp-dev` runs `docker compose -p <id>` using `project` (or `local.composeProjectName`) from wp-dev.config.json so volumes/containers do not clash across clones.
#
# MySQL 8 defaults to caching_sha2_password; the official wordpress:cli image does not load that
# plugin cleanly for `wp db import`. Use mysql_native_password for new DB volumes (see docker/.env.example).
services:
  db:
    image: mysql:8.0
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 15s

  wordpress:
    image: wordpress:php8.2-apache
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WP_PORT:-8888}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WPDEV_ADMIN_SAVE_TOKEN: ${WPDEV_ADMIN_SAVE_TOKEN:-}
    volumes:
      - ../wordpress:/var/www/html
      # wp-dev admin: config + logs + docker/ (so api.php can upsert Simply API key into docker/.env).
      - ../wp-dev.config.json:/wp-dev-repo/wp-dev.config.json:rw
      - ../logs:/wp-dev-repo/logs:rw
      - ../docker:/wp-dev-repo/docker:rw
    depends_on:
      db:
        condition: service_healthy

  # Official `wordpress` image has no `wp` binary; wp-dev uses this service for WP-CLI.
  wpcli:
    image: wordpress:cli-php8.2
    user: "33:33"
    volumes:
      - ../wordpress:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
    depends_on:
      db:
        condition: service_healthy

  terminal:
    build:
      context: .
      dockerfile: terminal.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WPDEV_TERMINAL_PORT:-7681}:7681"
      - "127.0.0.1:${WPDEV_TERMINAL_RUNNER_PORT:-7682}:7682"
    environment:
      WPDEV_TERMINAL_AUTH: ${WPDEV_TERMINAL_AUTH:-wpdev:wpdev}
      WPDEV_TERMINAL_RUNNER_TOKEN: ${WPDEV_TERMINAL_RUNNER_TOKEN:-}
      WPDEV_TERMINAL_RUNNER_ORIGIN: ${WPDEV_TERMINAL_RUNNER_ORIGIN:-http://localhost:${WP_PORT:-8888}}
      WPDEV_TERMINAL_WORKDIR: ${WPDEV_TERMINAL_WORKDIR:-/workspace}
      WPDEV_TERMINAL_RUNNER_PORT: ${WPDEV_TERMINAL_RUNNER_PORT:-7682}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
    volumes:
      - ../:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.wp-dev:/root/.wp-dev

volumes:
  db_data:
