name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: test -x dist/cli.js
      - run: php -l docs/admin/public/api.php && php -l docs/admin/public/schema-validate.inc.php
      - run: npm ci --prefix docs/admin
      - run: npm run typecheck --prefix docs/admin
      - run: npm run build --prefix docs/admin
      - run: npm run build:wp --prefix docs/admin
