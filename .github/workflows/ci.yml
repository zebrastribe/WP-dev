name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: none
      - run: npm ci
      - run: npm run release:gate
